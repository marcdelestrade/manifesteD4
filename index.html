<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D4 Manifeste</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Marked.js pour le rendu markdown (CDN, runtime) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  </head>
  <body>
    <!-- Écran de configuration -->
    <div id="config-screen" class="config-screen hidden">
      <div class="config-box">
        <h1>D4 Manifeste — Configuration</h1>
        <p class="config-intro">
          Premier lancement. Renseigne tes identifiants. Ils sont stockés
          <strong>uniquement dans ton navigateur</strong> (localStorage), jamais envoyés vers un serveur tiers.
        </p>
        <form id="config-form">
          <label>
            GitHub Username
            <input type="text" id="cfg-owner" value="marcdelestrade" required />
          </label>
          <label>
            Repo données (privé)
            <input type="text" id="cfg-repo" value="manifesteD4-data" required />
          </label>
          <label>
            GitHub Personal Access Token (scope <code>repo</code>)
            <input type="password" id="cfg-token" placeholder="ghp_..." required />
          </label>
          <label>
            Clé API Anthropic
            <input type="password" id="cfg-anthropic" placeholder="sk-ant-..." required />
          </label>
          <div class="config-actions">
            <button type="submit" id="cfg-submit">Valider et lancer l'app</button>
          </div>
          <p id="cfg-status" class="config-status"></p>
        </form>
      </div>
    </div>

    <!-- Application principale -->
    <div id="app" class="app hidden">
      <!-- Header -->
      <header class="app-header">
        <div class="header-left">
          <div class="logo">D4</div>
          <h1 class="app-title">Manifeste</h1>
        </div>
        <div class="header-center">
          <span id="active-section-title" class="active-section-title"></span>
        </div>
        <div class="header-right">
          <span id="save-indicator" class="save-indicator">Prêt</span>
          <button id="btn-settings" class="btn-icon" title="Configuration" aria-label="Configuration">⚙</button>
        </div>
      </header>

      <!-- Corps 3 colonnes -->
      <div class="app-body">
        <!-- Colonne gauche : TOC -->
        <aside class="col-left" id="col-left">
          <div class="toc-header">
            <input type="search" id="toc-search" placeholder="Rechercher…" />
            <div class="toc-filters">
              <button class="filter-btn active" data-filter="all">Toutes</button>
              <button class="filter-btn" data-filter="actives">Actives</button>
            </div>
          </div>
          <nav class="toc-list" id="toc-list" aria-label="Table des matières">
            <!-- Généré par JS -->
          </nav>
          <div class="toc-footer">
            <button id="btn-add-section" class="btn-add">＋ Ajouter une section</button>
          </div>
        </aside>

        <!-- Colonne centrale : Espace de travail -->
        <main class="col-center" id="col-center">
          <div class="tabs">
            <button class="tab-btn active" data-tab="manifeste">Manifeste</button>
            <button class="tab-btn" data-tab="taches">Tâches <span class="tab-count" id="count-taches">0</span></button>
            <button class="tab-btn" data-tab="projets">Projets <span class="tab-count" id="count-projets">0</span></button>
            <button class="tab-btn" data-tab="generer">Générer</button>
          </div>

          <!-- Onglet Manifeste -->
          <section class="tab-panel active" id="tab-manifeste">
            <div class="editor-toolbar">
              <button class="editor-btn" data-md="bold" title="Gras"><strong>B</strong></button>
              <button class="editor-btn" data-md="italic" title="Italique"><em>I</em></button>
              <button class="editor-btn" data-md="h2" title="Titre H2">H2</button>
              <button class="editor-btn" data-md="h3" title="Titre H3">H3</button>
              <button class="editor-btn" data-md="list" title="Liste">•</button>
              <button class="editor-btn" data-md="quote" title="Citation">"</button>
              <button class="editor-btn" data-md="hr" title="Séparateur">―</button>
              <div class="toolbar-spacer"></div>
              <button class="editor-btn" id="btn-preview-only" title="Affichage rendu uniquement">👁</button>
            </div>
            <div class="editor-split" id="editor-split">
              <textarea id="editor-textarea" spellcheck="true" placeholder="Contenu markdown…"></textarea>
              <div id="editor-preview" class="editor-preview markdown-body"></div>
            </div>
          </section>

          <!-- Onglet Tâches -->
          <section class="tab-panel" id="tab-taches">
            <div class="crud-header">
              <input
                type="text"
                id="tache-quick-add"
                placeholder="Nouvelle tâche — Entrée pour ajouter"
              />
            </div>
            <div class="crud-list" id="taches-list"></div>
          </section>

          <!-- Onglet Projets -->
          <section class="tab-panel" id="tab-projets">
            <div class="crud-header">
              <button class="btn-primary" id="btn-add-projet">＋ Nouveau projet</button>
            </div>
            <div class="crud-list" id="projets-list"></div>
          </section>

          <!-- Onglet Générer -->
          <section class="tab-panel" id="tab-generer">
            <div class="generer-controls">
              <label>
                Type de génération
                <select id="generer-type">
                  <option value="guide">Guide pratique (collaborateurs)</option>
                  <option value="faq">FAQ (clients / CS)</option>
                  <option value="html">Page HTML (site D4)</option>
                  <option value="resume">Résumé exécutif</option>
                  <option value="formation">Points de formation</option>
                </select>
              </label>
              <label>
                Précisions (optionnel)
                <textarea
                  id="generer-precisions"
                  rows="2"
                  placeholder="en insistant sur… / pour un public de…"
                ></textarea>
              </label>
              <button class="btn-primary" id="btn-generer">Générer</button>
            </div>
            <div class="generer-result markdown-body" id="generer-result"></div>
            <div class="generer-actions hidden" id="generer-actions">
              <button class="btn-secondary" id="btn-copy">Copier</button>
              <button class="btn-secondary" id="btn-dl-md">Télécharger .md</button>
              <button class="btn-secondary" id="btn-dl-html">Télécharger .html</button>
            </div>
          </section>
        </main>

        <!-- Colonne droite : Assistant IA -->
        <aside class="col-right" id="col-right">
          <div class="ai-header">
            <span>Assistant IA</span>
            <button class="btn-icon" id="btn-ai-clear" title="Nouvelle conversation">↻</button>
          </div>
          <div class="ai-messages" id="ai-messages"></div>
          <div class="ai-suggestions" id="ai-suggestions"></div>
          <div class="ai-input-zone">
            <textarea
              id="ai-input"
              rows="2"
              placeholder="Poser une question… (Cmd+Entrée pour envoyer)"
            ></textarea>
            <button id="ai-send" class="btn-primary">Envoyer</button>
          </div>
        </aside>
      </div>

      <!-- Navigation mobile -->
      <nav class="mobile-nav" id="mobile-nav">
        <button class="mobile-nav-btn active" data-col="left" aria-label="Table des matières">☰</button>
        <button class="mobile-nav-btn" data-col="center" aria-label="Espace de travail">📄</button>
        <button class="mobile-nav-btn" data-col="right" aria-label="Assistant IA">✦</button>
      </nav>
    </div>

    <!-- Scripts (ES modules) -->
    <script type="module" src="app.js"></script>
  </body>
</html>
